openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Nature Writing Platform API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: articles
    description: Article operations
  - name: portfolio
    description: Portfolio clip operations
  - name: contact
    description: Contact form operations
  - name: newsletter
    description: Newsletter subscriber operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /articles:
    get:
      operationId: listArticles
      tags: [articles]
      summary: List articles
      parameters:
        - name: category
          in: query
          schema:
            type: string
        - name: featured
          in: query
          schema:
            type: boolean
        - name: limit
          in: query
          schema:
            type: integer
            default: 20
        - name: offset
          in: query
          schema:
            type: integer
            default: 0
        - name: search
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of articles
          content:
            application/json:
              schema:
                type: object
                properties:
                  articles:
                    type: array
                    items:
                      $ref: "#/components/schemas/Article"
                  total:
                    type: integer
                required: [articles, total]
    post:
      operationId: createArticle
      tags: [articles]
      summary: Create an article
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateArticleBody"
      responses:
        "201":
          description: Created article
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Article"

  /articles/featured:
    get:
      operationId: getFeaturedArticles
      tags: [articles]
      summary: Get featured articles for the homepage
      responses:
        "200":
          description: Featured articles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Article"

  /articles/stats:
    get:
      operationId: getArticleStats
      tags: [articles]
      summary: Get article statistics grouped by category
      responses:
        "200":
          description: Article stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ArticleStats"

  /articles/{slug}:
    get:
      operationId: getArticle
      tags: [articles]
      summary: Get an article by slug
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Article
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Article"
        "404":
          description: Not found
    put:
      operationId: updateArticle
      tags: [articles]
      summary: Update an article
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateArticleBody"
      responses:
        "200":
          description: Updated article
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Article"
    delete:
      operationId: deleteArticle
      tags: [articles]
      summary: Delete an article
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted

  /portfolio:
    get:
      operationId: listPortfolioClips
      tags: [portfolio]
      summary: List portfolio clips
      parameters:
        - name: category
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of portfolio clips
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/PortfolioClip"
    post:
      operationId: createPortfolioClip
      tags: [portfolio]
      summary: Create a portfolio clip
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreatePortfolioClipBody"
      responses:
        "201":
          description: Created clip
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PortfolioClip"

  /portfolio/{id}:
    delete:
      operationId: deletePortfolioClip
      tags: [portfolio]
      summary: Delete a portfolio clip
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /contact:
    post:
      operationId: submitContact
      tags: [contact]
      summary: Submit a contact message
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateContactMessageBody"
      responses:
        "201":
          description: Message submitted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContactMessage"

  /newsletter:
    post:
      operationId: subscribeNewsletter
      tags: [newsletter]
      summary: Subscribe to the newsletter
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateNewsletterSubscriberBody"
      responses:
        "201":
          description: Subscribed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NewsletterSubscriber"
    get:
      operationId: listNewsletterSubscribers
      tags: [newsletter]
      summary: List newsletter subscribers
      responses:
        "200":
          description: List of subscribers
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/NewsletterSubscriber"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    Article:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        slug:
          type: string
        excerpt:
          type: string
        content:
          type: string
        category:
          type: string
        imageUrl:
          type: string
          nullable: true
        readTime:
          type: integer
        featured:
          type: boolean
        publishedAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
      required: [id, title, slug, excerpt, content, category, readTime, featured, publishedAt, createdAt]

    CreateArticleBody:
      type: object
      properties:
        title:
          type: string
        slug:
          type: string
        excerpt:
          type: string
        content:
          type: string
        category:
          type: string
        imageUrl:
          type: string
          nullable: true
        readTime:
          type: integer
        featured:
          type: boolean
      required: [title, slug, excerpt, content, category, readTime, featured]

    ArticleStats:
      type: object
      properties:
        total:
          type: integer
        byCategory:
          type: array
          items:
            type: object
            properties:
              category:
                type: string
              count:
                type: integer
            required: [category, count]
        featuredCount:
          type: integer
      required: [total, byCategory, featuredCount]

    PortfolioClip:
      type: object
      properties:
        id:
          type: integer
        title:
          type: string
        publication:
          type: string
        url:
          type: string
        date:
          type: string
        category:
          type: string
        createdAt:
          type: string
          format: date-time
      required: [id, title, publication, url, date, category, createdAt]

    CreatePortfolioClipBody:
      type: object
      properties:
        title:
          type: string
        publication:
          type: string
        url:
          type: string
        date:
          type: string
        category:
          type: string
      required: [title, publication, url, date, category]

    ContactMessage:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        subject:
          type: string
        message:
          type: string
        createdAt:
          type: string
          format: date-time
      required: [id, name, email, subject, message, createdAt]

    CreateContactMessageBody:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        subject:
          type: string
        message:
          type: string
      required: [name, email, subject, message]

    NewsletterSubscriber:
      type: object
      properties:
        id:
          type: integer
        email:
          type: string
        name:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required: [id, email, createdAt]

    CreateNewsletterSubscriberBody:
      type: object
      properties:
        email:
          type: string
        name:
          type: string
          nullable: true
      required: [email]
